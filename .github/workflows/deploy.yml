name: Deploy to AWS VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Laravel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}" <<'EOF'
            set -e
            cd "${{ secrets.AWS_APP_DIR }}"

            if [ -n "$(git status --porcelain)" ]; then
              git stash push -m "auto-deploy-before-pull-$(date +%Y%m%d%H%M%S)"
            fi
            git pull --ff-only origin main
            mkdir -p storage/logs bootstrap/cache public/build
            sudo chown -R ubuntu:www-data storage bootstrap/cache public/build
            sudo chmod -R ug+rwX storage bootstrap/cache public/build

            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            npm ci
            npm run build

            php artisan config:clear
            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R ubuntu:www-data storage bootstrap/cache public/build
            sudo chmod -R ug+rwX storage bootstrap/cache public/build
            sudo systemctl reload php8.4-fpm
            sudo systemctl reload nginx
            sudo systemctl restart zrinttailor-cv || true
          EOF
